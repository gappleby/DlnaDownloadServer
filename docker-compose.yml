services:
  fetchtv:
    # To use published image:  comment out 'build' and uncomment 'image'
    build: .
    # image: ghcr.io/gappleby/dlnadownloadserver:latest
    ports:
      - "8000:8000"
    volumes:
      - ${OUTPUT_DIR:-./recordings}:/output
    environment:
      - FETCH_HOST=${FETCH_HOST}
      - FETCH_PORT=${FETCH_PORT:-49152}
      - OUTPUT_DIR=/output
      - APP_NAME=${APP_NAME:-Fetch TV Downloader}
      - ROOT_PATH=${ROOT_PATH:-}
      - PROGRESS_MODE=${PROGRESS_MODE:-sse}
      - POLL_INTERVAL=${POLL_INTERVAL:-3}
    restart: unless-stopped
    # Docker Desktop for Windows/Mac routes to the LAN automatically.
    # On a plain Linux Docker host, replace the above with:
    #   network_mode: host
    # and remove the ports: mapping.
